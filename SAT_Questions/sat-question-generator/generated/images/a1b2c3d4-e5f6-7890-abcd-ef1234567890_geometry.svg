<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Horizontal line m -->
  <line x1="50" y1="50" x2="350" y2="50" stroke="black" stroke-width="2"/>
  <text x="20" y="55" font-size="16">m</text>

  <!-- Horizontal line n -->
  <line x1="50" y1="200" x2="350" y2="200" stroke="black" stroke-width="2"/>
  <text x="20" y="205" font-size="16">n</text>

  <!-- Transversal line -->
  <line x1="50" y1="250" x2="350" y2="20" stroke="black" stroke-width="2"/>

  <!-- Angle a -->
  <path d="M350 50 A20 20 0 0 0 330 30" fill="none" stroke="red" stroke-width="2"/>
  <text x="335" y="25" font-size="16">a</text>

  <!-- Angle b -->
  <path d="M350 200 A20 20 0 0 0 330 180" fill="none" stroke="red" stroke-width="2"/>
  <text x="335" y="175" font-size="16">b</text>
</svg>