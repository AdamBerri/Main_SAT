  <line x1="200" y1="150" x2="280" y2="150" stroke="black" stroke-width="1" />
  <line x1="280" y1="145" x2="280" y2="155" stroke="black" stroke-width="1" />
  <text x="235" y="145" font-size="12" text-anchor="middle">8 feet</text>

  <!-- Extension Label -->
