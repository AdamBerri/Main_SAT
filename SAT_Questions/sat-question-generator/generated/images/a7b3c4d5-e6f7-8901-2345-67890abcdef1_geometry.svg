<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .label {
        font-size: 12px;
        font-family: sans-serif;
        fill: black;
      }
      .line {
        stroke: black;
        stroke-width: 2;
      }
    </style>
  </defs>

  <!-- Parallel lines m and n -->
  <line x1="50" y1="50" x2="350" y2="50" class="line" id="line_m"/>
  <line x1="50" y1="200" x2="350" y2="200" class="line" id="line_n"/>

  <!-- Transversal line t -->
  <line x1="75" y1="250" x2="325" y2="25" class="line" id="line_t"/>

  <!-- Intersection points -->
  <circle cx="100" cy="50" r="3" fill="black" />
  <circle cx="150" cy="200" r="3" fill="black" />

  <!-- Angle arcs and labels -->
  <path d="M 90 50 A 10 10 0 0 1 100 40" fill="none" stroke="red" stroke-width="1"/>
  <text x="85" y="35" class="label">A = (3x + 15)°</text>

  <path d="M 140 200 A 10 10 0 0 1 150 210" fill="none" stroke="red" stroke-width="1"/>
  <text x="135" y="225" class="label">B = (2x - 5)°</text>

  <path d="M 160 200 A 10 10 0 0 0 150 210" fill="none" stroke="red" stroke-width="1"/>
  <text x="165" y="225" class="label">C = (4x + 25)°</text>

  <!-- Line labels -->
  <text x="360" y="55" class="label">m</text>
  <text x="360" y="205" class="label">n</text>
  <text x="330" y="20" class="label">t</text>

</svg>